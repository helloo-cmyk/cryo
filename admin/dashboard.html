<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | CRYO Admin</title>
  <link rel="stylesheet" href="assets/css/admin.css">
  
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <img src="../assets/images/cryo-logo-horizontal.png" alt="CRYO Logo">
      </div>
      <nav></nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="topbar">
        <h1 class="page-title">Dashboard Overview</h1>
        <div class="user-profile">
          <span id="admin-email">Admin</span>
          <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path></svg></div>
          <div class="stat-info">
            <h4>Total Products</h4>
            <h2 id="stat-products">0</h2>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg></div>
          <div class="stat-info">
            <h4>Total Orders</h4>
            <h2 id="stat-orders">0</h2>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></div>
          <div class="stat-info">
            <h4>Total Revenue</h4>
            <h2 id="stat-revenue">Rs. 0</h2>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>
          <div class="stat-info">
            <h4>Pending Orders</h4>
            <h2 id="stat-pending">0</h2>
          </div>
        </div>
      </div>

      <!-- Recent Orders Table -->
      <div class="admin-card">
        <div class="card-header">
          <h3>Recent Orders</h3>
          <a href="/admin/orders" class="btn-sm" style="text-decoration:none;">View All</a>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Date</th>
              <th>Items</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="recent-orders-body">
            <tr>
              <td colspan="6" style="text-align:center;">Loading recent orders...</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="../assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/admin.js"></script>
  <script src="assets/js/admin-nav.js"></script>
</body>
</html>
