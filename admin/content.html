<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pages | CRYO Admin</title>
  <link rel="stylesheet" href="assets/css/admin.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <img src="../assets/images/cryo-logo-horizontal.png" alt="CRYO Logo">
      </div>
      <nav></nav>
    </aside>

    <main class="admin-main">
      <div class="topbar">
        <h1 class="page-title">Page Content</h1>
        <div class="user-profile">
          <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
      </div>

      <div class="content-tabs">
        <button type="button" class="content-tab-btn active" data-panel="panel-policies">Policy Pages</button>
        <button type="button" class="content-tab-btn" data-panel="panel-about">About Page</button>
      </div>

      <!-- Policy Pages -->
      <div id="panel-policies" class="content-tab-panel admin-card">
        <div class="card-header"><h3>Policy Pages</h3></div>
        <div class="form-group">
          <label>Select Page</label>
          <select id="policy-slug" class="form-control">
            <option value="privacy-policy">Privacy Policy</option>
            <option value="terms">Terms & Conditions</option>
            <option value="shipping-policy">Shipping Policy</option>
            <option value="return-policy">Return / Refund Policy</option>
          </select>
        </div>
        <div class="form-group">
          <label>Page Title</label>
          <input type="text" id="policy-title" class="form-control">
        </div>
        <div class="form-group">
          <label>Page Content</label>
          <div id="editor-policy"></div>
        </div>
        <button type="button" id="save-policy-btn" class="btn-admin">Save Policy Page</button>
        <p id="policy-msg" style="color:var(--admin-success); margin-top:10px; display:none;">Policy saved!</p>
      </div>

      <!-- About Page -->
      <div id="panel-about" class="content-tab-panel admin-card" style="display:none;">
        <div class="card-header"><h3>About Page Content</h3></div>
        <div class="form-group">
          <label>Mission Section Title</label>
          <input type="text" id="about-mission-title" class="form-control">
        </div>
        <div class="form-group">
          <label>Mission Content (paragraphs + benefits list)</label>
          <div id="editor-about-mission"></div>
        </div>
        <div class="form-group">
          <label>Key Benefits List (HTML list)</label>
          <div id="editor-about-benefits"></div>
        </div>
        <div class="form-group">
          <label>Premium Formula Title</label>
          <input type="text" id="about-formula-title" class="form-control">
        </div>
        <div class="form-group">
          <label>Premium Formula Content</label>
          <div id="editor-about-formula"></div>
        </div>
        <div class="form-group">
          <label>Quality Commitment Title</label>
          <input type="text" id="about-quality-title" class="form-control">
        </div>
        <div class="form-group">
          <label>Quality Commitment Content</label>
          <div id="editor-about-quality"></div>
        </div>
        <p style="color:var(--admin-text-muted); font-size:13px; margin-bottom:15px;">About page images are managed under Banners.</p>
        <button type="button" id="save-about-btn" class="btn-admin">Save About Page</button>
        <p id="about-msg" style="color:var(--admin-success); margin-top:10px; display:none;">About page saved!</p>
      </div>
    </main>
  </div>

  <script src="../assets/js/supabase-config.js"></script>
  <script src="../assets/js/cms-store.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/admin.js"></script>
  <script src="assets/js/admin-nav.js"></script>
  <script src="assets/js/cms-admin.js"></script>
</body>
</html>
