<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | CRYO Radiator Coolant</title>
  
  <link rel="stylesheet" href="assets/css/style.css?v=6">
  
  <script src="assets/js/components.js?v=6" defer></script>

  <style>
    .contact-card {
      background: #111;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
    }
    .contact-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: var(--primary);
    }
    .contact-card h3 {
      color: var(--white);
      margin-bottom: 20px;
      font-family: 'Barlow', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .contact-info-list {
      list-style: none;
      padding: 0; margin: 0;
    }
    .contact-info-list li {
      margin-bottom: 15px;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
    }
    .contact-info-list li strong {
      color: var(--white);
      margin-bottom: 5px;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
    }
    .contact-info-list a {
      color: var(--text-muted);
      transition: color 0.3s;
    }
    .contact-info-list a:hover {
      color: var(--primary);
    }
    .map-container {
      height: 350px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      filter: grayscale(100%) invert(90%) contrast(85%);
      transition: filter 0.5s ease;
    }
    .map-container:hover {
      filter: none;
    }
  </style>
</head>
<body>

  <site-header></site-header>

  <main>
    <!-- Page Banner -->
    <section class="page-banner contact-banner">
      <div class="container">
        <h1>Contact Us</h1>
        <div class="breadcrumb">
          <a href="index.html">Home</a> > Contact
        </div>
      </div>
    </section>

    <section class="container" style="padding: 80px 0;">
      <div class="grid grid-cols-2 gap-30">
        
        <!-- Contact Details -->
        <div>
          <div class="contact-card" style="margin-bottom: 30px;">
            <h3>Get in Touch</h3>
            <ul class="contact-info-list">
              <li><strong>Phone</strong> <a href="tel:03014138007">0301-4138007</a></li>
              <li><strong>WhatsApp</strong> <a href="https://wa.me/923014138007">0301-4138007</a></li>
              <li><strong>Email</strong> <a href="mailto:info@cryo.pk">info@cryo.pk</a></li>
              <li><strong>Headquarters</strong> Fiesta Garden, Nawan Shehar,<br> Near RTO Office, Multan</li>
            </ul>
          </div>
          
          <div class="map-container">
            <iframe 
              src="https://maps.google.com/maps?q=Fiesta%20Garden%20Nawan%20Shehar%20Near%20RTO%20Office%20Multan&t=&z=13&ie=UTF8&iwloc=&output=embed" 
              width="100%" 
              height="100%" 
              style="border:0;" 
              allowfullscreen="" 
              loading="lazy" 
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>

        <!-- Contact Form -->
        <div>
          <div class="contact-card">
            <h3>Send a Message</h3>
            <form id="contact-form">
              <div id="contact-success-msg" style="display: none; background: rgba(40, 167, 69, 0.2); border: 1px solid #28A745; color: #28A745; padding: 15px; margin-bottom: 20px; text-align: center; font-family: 'Inter', sans-serif;">
                Message Sent!
              </div>
              <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" style="color: var(--white); font-weight: 600; margin-bottom: 8px; display: block;">FULL NAME</label>
                <input type="text" class="form-control" style="background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; width: 100%;" required>
              </div>
              <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" style="color: var(--white); font-weight: 600; margin-bottom: 8px; display: block;">EMAIL / PHONE</label>
                <input type="text" class="form-control" style="background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; width: 100%;" required>
              </div>
              <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" style="color: var(--white); font-weight: 600; margin-bottom: 8px; display: block;">MESSAGE</label>
                <textarea id="c-msg" class="form-control" rows="6" style="background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; width: 100%;" required></textarea>
              </div>
              <button type="submit" class="btn btn-red" style="width: 100%; padding: 15px; font-size: 16px;">TRANSMIT MESSAGE</button>
            </form>
          </div>
        </div>
        
      </div>
    </section>
  </main>

  <site-footer></site-footer>

  <script src="assets/js/main.js?v=6"></script>
</body>
</html>
